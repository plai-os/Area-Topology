type: custom:lcars-home-card
title: 32 Maesderw, Sarn, Powys
kiosk_url: https://home.sarn.online/dashboard-maesderw/star-trek?kiosk
header_color: "#263F4B"
datetime_color: "#FF9900"
kiosk_height: 100vh

# The ordered menu is the dashboard structure. Home Assistant areas and labels are
# selectors inside sections; they do not create or constrain the navigation tree.
views:
  - id: bridge
    title: Bridge
    type: dashboard
    default: true
    color: "#6F99A8"
    rail:
      top: 32
      middle: MAESDERW
      bottom: SY16 4BD
      middle_color: "#6F99A8"
      middle_text_color: "#FFFFFF"
    section_layout: primary
    primary_section: lounge
    cell_motion_sensor: binary_sensor.c110_cell_motion_detection
    person_detection_sensor: binary_sensor.c110_person_detection
    sections:
      - id: lounge
        type: area
        title: Lounge
        area: Lounge
      - id: kitchen
        type: area
        title: Kitchen
        area: Kitchen
      - id: escape_pod
        type: camera
        title: Main Viewer
        entity: camera.c110_mainstream

  - id: general
    title: General
    type: dashboard
    color: "#B58AAD"
    rail:
      top: MJ-32
      middle: SYSTEMS
      bottom: MJ-32
      middle_color: "#B58AAD"
      middle_text_color: "#FFFFFF"
    section_layout: balanced
    primary_section: infrastructure
    sections:
      - id: infrastructure
        type: devices
        title: Infrastructure
        labels: [Routers, Computers, Powerstations]
      - id: services
        type: devices
        title: Services
        labels: [Service, Speaker Group]
      - id: mobile_devices
        type: devices
        title: Mobile Devices
        labels: [Mobiles]

  - id: shuttle_bay
    title: Shuttle Bay
    type: dashboard
    color: "#C58A69"
    rail:
      top: 0003 MOJ
      middle: PEUGEOT
      bottom: 0003 MOJ
      middle_color: "#C58A69"
      middle_text_color: "#FFFFFF"
    section_layout: primary
    primary_section: garage
    cell_motion_sensor: binary_sensor.c110_cell_motion_detection
    person_detection_sensor: binary_sensor.c110_person_detection
    sections:
      - id: garage
        type: area
        title: Garage
        area: Garage
      - id: car
        type: camera
        title: Car
        entity: camera.c110_mainstream

  - id: deep_space
    title: Deep Space
    type: dashboard
    color: "#B88768"
    rail:
      top: MJ-32
      middle: SENSOR ARRAY
      bottom: MJ-32
      middle_color: "#B88768"
      middle_text_color: "#FFFFFF"
    primary_section: front
    sections:
      - id: front
        type: area
        title: Front Garden
        area: Front Garden
        column: left
      - id: rear
        type: area
        title: Rear Garden
        area: Rear Garden
        column: left

  - id: west_wing
    title: Habitat
    type: dashboard
    color: "#9B8F5A"
    rail:
      top: MJ-32
      middle: HABITAT
      bottom: MJ-32
      middle_color: "#9B8F5A"
      middle_text_color: "#FFFFFF"
    primary_section: bedroom
    sections:
      - id: bedroom
        type: area
        title: Bedroom
        area: Bedroom
      - id: ready_room
        type: area
        title: Ready Room
        area: Ready Room
      - id: bathroom
        type: area
        title: Bathroom
        area: Bathroom

  - id: warp_engines
    title: Warp Engines
    type: dashboard
    color: "#8F90C2"
    rail:
      top: MJ-32
      middle: PROPULSION
      bottom: MJ-32
      middle_color: "#8F90C2"
      middle_text_color: "#FFFFFF"
    primary_section: loft
    sections:
      - id: loft
        type: area
        title: Loft
        area: Loft

  - id: weather
    title: Life Support
    type: weather
    color: "#66AACC"
    rail:
      top:
        source: weather
        attribute: temperature
        unit: °C
        decimals: 1
        fallback: "--"
      middle:
        source: weather
        uppercase: true
        fallback: UNKNOWN
      bottom:
        source: weather
        attribute: wind_gust_speed
        label: GUSTS
        unit: km/h
        decimals: 1
        fallback: "--"
      middle_color: "#66AACC"
      middle_text_color: "#FFFFFF"
    entity: weather.pirateweather
    sun_entity: sun.sun
    temperature_sensor: sensor.outdoor_temp
    humidity_sensor: sensor.outdoor_humidity
    apparent_sensor: sensor.real_feel_temperature
    aqi_sensor: sensor.air_quality_index
    forecast_rows: 10
    hourly_rows: 8
    locale: en-GB
    show_decimal: true
    sections:
      - type: card
        title: 24 Hour Temperature
        icon: mdi:chart-line
        card:
          type: statistics-graph
          entities:
            - sensor.front_sarn_temperature
          days_to_show: 1
          period: hour
          chart_type: line
          stat_types: [mean]
      - type: card
        title: 7 Day Temperature Range
        icon: mdi:chart-areaspline
        card:
          type: statistics-graph
          entities:
            - sensor.front_sarn_temperature
          days_to_show: 7
          period: day
          chart_type: line
          stat_types: [mean, min, max]

  - id: security
    title: Security
    type: security
    color: "#B56B7A"
    rail:
      top: MJ-32
      middle: TACTICAL
      bottom: MJ-32
      middle_color: "#B56B7A"
      middle_text_color: "#FFFFFF"
    sections:
      - id: escape_pod
        type: camera
        title: Escape Pod
        entity: camera.c110_mainstream
        camera_image: camera.c110_mainstream
        show_state: true
        camera_view: auto
        fit_mode: cover

  - id: engineering
    title: Engineering
    type: engineering
    color: "#FF9966"
    rail:
      top:
        entity: sensor.octopus_energy_electricity_22p5024798_2200042031306_current_demand
        label: POWER
        decimals: 0
        fallback: "--"
      middle: OCTOPUS
      bottom:
        entity: sensor.sarn_32_maesderw_sarn
        label: SOLAR
        decimals: 1
        fallback: "--"
      middle_color: "#FF9966"
      middle_text_color: "#FFFFFF"
    chart_color: "#FF9966"
    chart_secondary_color: "#9999FF"
    chart_tertiary_color: "#FFCC99"
    sections:
      - type: metric
        title: Demand
        name: Demand
        icon: mdi:flash
        entity: sensor.octopus_energy_electricity_22p5024798_2200042031306_current_demand
      - type: metric
        name: Standing
        icon: mdi:currency-gbp
        entity: sensor.octopus_energy_electricity_22p5024798_2200042031306_current_standing_charge
      - type: metric
        name: Rate
        icon: mdi:currency-gbp
        entity: sensor.octopus_energy_electricity_22p5024798_2200042031306_current_rate
      - type: metric
        name: Points
        icon: mdi:trophy-outline
        entity: sensor.octopus_energy_a_52705f81_octoplus_points
      - type: card
        title: Daily Demand
        icon: mdi:chart-bar
        card:
          type: statistics-graph
          entities:
            - sensor.octopus_energy_electricity_22p5024798_2200042031306_current_demand
          days_to_show: 7
          period: day
          chart_type: bar
          stat_types: [max]
          hide_legend: true
      - type: card
        title: Hourly Demand
        icon: mdi:chart-line
        card:
          type: statistics-graph
          entities:
            - sensor.octopus_energy_electricity_22p5024798_2200042031306_current_demand
          days_to_show: 1
          period: hour
          chart_type: line
          stat_types: [mean]
          hide_legend: true
      - type: card
        title: Solar Available
        icon: mdi:solar-power
        card:
          type: sensor
          entity: sensor.sarn_32_maesderw_sarn
          graph: line
          detail: 2
          name: Solar Available (Sarn)
          hours_to_show: 48

  - id: captains_log
    title: Captain's Log
    type: calendar
    color: "#C090B8"
    rail:
      top: MJ-32
      middle: RECORDS
      bottom: MJ-32
      middle_color: "#C090B8"
      middle_text_color: "#FFFFFF"
    initial_view: listWeek
    sections:
      - type: calendar
        title: Calendar
        entities:
          - calendar.octopus_energy_a_52705f81_octoplus_saving_sessions
          - calendar.octopus_energy_a_52705f81_greener_nights
          - calendar.birthdays
          - calendar.mike_jackson
          - calendar.waste_collection_schedule_powys_county_council
          - calendar.holidays_in_united_kingdom
          - calendar.sarn_powys_gmail_com

  - id: environmental
    title: Environmental
    type: dashboard
    icon: mdi:leaf
    color: "#7A9E8E"
    rail:
      top: MJ-32
      middle: LIFE SUPPORT
      bottom: MJ-32
      middle_color: "#7A9E8E"
      middle_text_color: "#FFFFFF"
    sections:
      - id: waste_collection
        type: devices
        title: Waste Management
        icon: mdi:recycle
        device_title: Collection Schedule
        device_icon: mdi:trash-can-outline
        color: "#7A9E8E"
        entities:
          - sensor.waste_collection_schedule_recycling_and_food_waste
          - sensor.waste_collection_schedule_garden_waste
          - sensor.waste_collection_schedule_general_rubbish
      - id: environment
        type: devices
        title: Environmental Systems
        labels: [Climate]
        exclude_labels: [Appliances]
        properties: [temperature, humidity, illuminance, climate]
      - id: appliances
        type: devices
        title: Appliances
        icon: mdi:home-lightning-bolt-outline
        labels: [Appliances]

  - id: computer_core
    title: Computer Core
    type: dashboard
    icon: mdi:server
    color: "#8B7AAE"
    rail:
      top: MJ-32
      middle: DATA CORE
      bottom: MJ-32
      middle_color: "#8B7AAE"
      middle_text_color: "#FFFFFF"
    sections:
      - id: computer_systems
        type: devices
        title: Computer Systems
        labels: [Computers, Service, Routers, Powerstations]

  - id: personnel
    title: Personnel
    type: dashboard
    icon: mdi:account-group
    color: "#B48A78"
    sections:
      - id: personnel_systems
        type: devices
        title: Personnel Systems
        labels: [Mobiles]
    rail:
      top: MJ-32
      middle: PERSONNEL
      bottom: MJ-32
      middle_color: "#B48A78"
      middle_text_color: "#FFFFFF"

label_colors:
  Alexa: "#9B8F5A"
  Lamps: "#B98465"
  Climate: "#6F8F91"
  Door Sensors: "#A65F61"
  Movement Sensors: "#7D82A8"
  Cameras: "#8D668E"
  Plugs: "#806B62"
  Mobiles: "#AA735F"
  Computers: "#718892"
  Service: "#8C9760"
  Powerstations: "#5F8F87"
  Routers: "#5F8C99"
  Speaker Group: "#777B82"
  Appliances: "#9E6179"
  Remotes: "#A9864E"

area_colors:
  Lounge: "#5F8C99"
  Kitchen: "#5F8C99"
  Bedroom: "#9B8F5A"
  Garage: "#B88768"
  Ready Room: "#9B8F5A"
  Bathroom: "#9B8F5A"
  Front Garden: "#B88768"
  Rear Garden: "#B88768"
  Loft: "#8D83AA"
